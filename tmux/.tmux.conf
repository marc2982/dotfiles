set-option -g bell-action none
set-option -g visual-bell on
set -g mouse on
set-option -g default-shell /usr/bin/zsh
set-option -g renumber-windows on

# peon-ping: auto-remove attention markers when focusing panes
set-hook -g pane-focus-in "run-shell '$HOME/.claude/hooks/peon-ping/remove-marker.sh #{pane_id}'"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'egel/tmux-gruvbox'
set -g @plugin 'erikw/tmux-powerline'
#set -g @plugin 'x4121/tmux-slack-counter'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'jaclu/tmux-menus'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_sync_prompt 'SYNC'
set -g @prefix_highlight_prefix_prompt 'PREFIX'

set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15' # Optional, default is 15 mins

set -g @plugin 'thepante/tmux-git-autofetch'
set -g @git-autofetch-scan-paths "~/git/synctera/*"
set -g @git-autofetch-frequency "10"
set -g @git-autofetch-logging "true"

TMUX_POWERLINE_THEME="marc"

bind-key -n C-BSpace send-keys C-w
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# Re-bind split keys to open in the current directory
unbind '"'
unbind %
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# pertmux dashboard popup (prefix+a toggles open/close)
bind-key p display-popup -h 80% -w 80% -E "pertmux connect"
bind-key g display-popup -h 80% -w 80% -E "sc gitlab mrs list --actionable"
bind-key l display-popup -h 80% -w 80% -E "sc linear issues list --mine"

# View sub-table — C-a v <key>
#bind-key v switch-client -T view-table
## <v>iew <l>inear
#bind-key -T view-table l display-popup -h 30% -w 50% -E "sc linear issues list --mine"
## <v>iew <g>gitlab
#bind-key -T view-table g display-popup -h 30% -w 50% -E "sc gitlab mrs list --actionable --sort updated_asc"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
